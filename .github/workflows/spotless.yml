name: Spotless

on: [push, pull_request]

jobs:
  spotless:
    name: "Spotless"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 10
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Check
        run: ./gradlew spotlessCheck -PspotlessRatchet=false
