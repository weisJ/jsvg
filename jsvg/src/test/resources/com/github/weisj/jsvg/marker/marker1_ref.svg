<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
	<defs>
		<!-- Arrow pointing forward (used at path-end positions) -->
		<marker id="arrow_fwd" viewBox="0 0 10 10" refX="5" refY="5"
			markerWidth="6" markerHeight="6" orient="auto">
			<path d="M 0 0 L 10 5 L 0 10 z" />
		</marker>

		<!-- Arrow pointing backward (used at path-start positions, replacing
		     auto-start-reverse by mirroring the triangle shape). -->
		<marker id="arrow_rev" viewBox="0 0 10 10" refX="5" refY="5"
			markerWidth="6" markerHeight="6" orient="auto">
			<path d="M 10 0 L 0 5 L 10 10 z" />
		</marker>

		<!-- Simple dot marker (no orient dependence) -->
		<marker id="dot" viewBox="0 0 10 10" refX="5" refY="5"
			markerWidth="5" markerHeight="5">
			<circle cx="5" cy="5" r="5" fill="red" />
		</marker>
	</defs>

	<polyline points="50,50" fill="none" stroke="blue"
		marker-start="url(#dot)" />

	<!-- Coordinate axes: reversed arrow at start, forward at end -->
	<polyline points="10,10 10,90 90,90" fill="none"
		stroke="black" marker-start="url(#arrow_rev)" marker-end="url(#arrow_fwd)" />

	<!-- Data line with dot polymarkers (dot is symmetric so no reversal needed) -->
	<polyline points="15,80 29,50 43,60 57,30 71,40 85,15"
		fill="none" stroke="grey" marker-start="url(#dot)"
		marker-mid="url(#dot)" marker-end="url(#dot)" />
</svg>
