<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
	<defs>
		<clipPath id="clipLeft">
			<rect x="0" y="0" width="45" height="45" />
		</clipPath>
		<clipPath id="clipRight">
			<rect x="55" y="0" width="45" height="45" />
		</clipPath>
	</defs>

	<!-- Flattened equivalent of mask-type="alpha" -->
	<g clip-path="url(#clipLeft)">
		<rect x="0" y="0" width="45" height="45" fill="red"
			fill-opacity="0.4" />
		<circle cx="50" cy="50" r="35" fill="red" fill-opacity="0.6" />
	</g>

	<!-- Flattened equivalent of mask-type="luminance" -->
	<g clip-path="url(#clipRight)">
		<rect x="55" y="0" width="45" height="45" fill="red"
			fill-opacity="0.04" />
		<circle cx="50" cy="50" r="35" fill="red" fill-opacity="0.5375" />
	</g>
</svg>
