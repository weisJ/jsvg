<svg width="200" height="200" viewBox="0 0 200 200"
	xmlns="http://www.w3.org/2000/svg">
	<defs>
		<!-- Linear gradient in user-space coordinates -->
		<linearGradient id="lgUser"
			gradientUnits="userSpaceOnUse"
			x1="20" y1="0" x2="180" y2="0">
			<stop offset="0%"   stop-color="green" />
			<stop offset="100%" stop-color="yellow" />
		</linearGradient>

		<!-- Radial gradient in user-space coordinates -->
		<radialGradient id="rgUser"
			gradientUnits="userSpaceOnUse"
			cx="100" cy="150" r="70">
			<stop offset="0%"   stop-color="white" />
			<stop offset="100%" stop-color="navy"  />
		</radialGradient>
	</defs>

	<rect x="10"  y="10"  width="180" height="80" fill="url(#lgUser)" />
	<rect x="10"  y="110" width="180" height="80" fill="url(#rgUser)" />
</svg>
