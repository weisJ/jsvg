<svg xmlns="http://www.w3.org/2000/svg" width="275" height="200"
	viewBox="0 0 275 200">
	<defs>
		<!-- Two markers with explicit fill colours, replacing context-stroke -->
		<marker id="TriangleCrimson" viewBox="0 0 10 10" refX="1" refY="5"
			markerUnits="strokeWidth" markerWidth="4" markerHeight="3"
			orient="auto">
			<path d="M 0 0 L 10 5 L 0 10 z" fill="crimson" />
		</marker>
		<marker id="TriangleOlivedrab" viewBox="0 0 10 10" refX="1" refY="5"
			markerUnits="strokeWidth" markerWidth="4" markerHeight="3"
			orient="auto">
			<path d="M 0 0 L 10 5 L 0 10 z" fill="olivedrab" />
		</marker>
	</defs>

	<g fill="none" stroke-width="10">
		<path marker-end="url(#TriangleCrimson)" stroke="crimson"
			d="M 100,75 C 125,50 150,50 175,75" />
		<path marker-end="url(#TriangleOlivedrab)" stroke="olivedrab"
			d="M 175,125 C 150,150 125,150 100,125" />
	</g>
</svg>
