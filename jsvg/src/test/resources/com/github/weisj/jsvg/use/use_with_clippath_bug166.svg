<svg xmlns:xlink="http://www.w3.org/1999/xlink"
	xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="500"
	height="500">
	<defs>
		<g id="flag">
			<linearGradient id="french_flag" x2="100%" y2="0%">
				<stop offset="33.3%" stop-color="blue" />
				<stop offset="33.3%" stop-color="white" />
				<stop offset="66.7%" stop-color="white" />
				<stop offset="66.7%" stop-color="red" />
			</linearGradient>

			<rect fill="url(#french_flag)" stroke="black" stroke-width="1"
				width="36" height="24" />
			<rect id="border" width="36" height="24" fill="none"
				stroke="black" stroke-width="0.5" />

			<clipPath id="clip">
				<use xlink:href="#border" />
			</clipPath>
		</g>
	</defs>

	<rect width="50" height="50" fill="white" stroke="black"
		stroke-width="2" />
	<use xlink:href="#flag" x="7" y="12" clip-path="url(#clip)" />
</svg>
